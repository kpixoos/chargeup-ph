# backend/docker-compose.yml
version: "3.9"

services:
  backend:
    build: .
    container_name: chargeup-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    container_name: chargeup-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chargeup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: chargeup-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
